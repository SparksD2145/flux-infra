---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-urbackup-database-pv
spec:
  capacity:
    storage: 70Gi
  accessModes:
    - ReadWriteMany
  local:
    path: /mnt/local2/backups.sparks.codes/db
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - tango

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-urbackup-database-pvc
  namespace: media
spec:
  volumeName: local-urbackup-database-pv
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 70Gi
