---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: urbackup
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 15m
  values:
    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: tango
      hostNetwork: true
    controllers:
      main:
        containers:
          main:
            image:
              repository: uroni/urbackup-server
              tag: "latest"
            env:
              TZ: "America/Chicago"
              PUID: 0
              PGID: 0
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 250m
                memory: 1Gi
    service:
      main:
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: 10.10.201.14
        controller: main
        ports:
          http:
            enabled: true
            primary: true
            port: 55414
            protocol: TCP
          tcp1:
            enabled: true
            primary: false
            port: 55413
          tcp2:
            enabled: true
            primary: false
            port: 55415
            protocol: TCP
          udp2:
            enabled: true
            primary: false
            port: 35623
            protocol: UDP
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/appName: "Backups"
          hajimari.io/info: "System Backup Utility"
          hajimari.io/icon: "backup-restore"
          hajimari.io/targetBlank: "true"
        hosts:
          - host: &host backups.sparks.codes
            paths:
              - path: "/"
                pathType: "Prefix"
                service:
                  identifier: main
                  port: http
        tls:
          - hosts:
              - *host
            secretName: acme-crt-secret-sparks-codes
    persistence:
      backups:
        enabled: true
        globalMounts:
          - path: /backups
        existingClaim: local-urbackup-backups-pvc
      database:
        enabled: true
        globalMounts:
          - path: /var/urbackup
        existingClaim: local-urbackup-database-pvc
