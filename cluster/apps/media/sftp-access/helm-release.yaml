---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sftp-access
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: atmoz/sftp
              tag: "latest"
            args:
              - "sftpuser:pass12345:::storage"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    service:
      main:
        enabled: true
        controller: main
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: 10.10.201.15
        ports:
          ftp:
            port: 2222
            targetPort: 22
            protocol: TCP

    persistence:
      input:
        existingClaim: immich
        advancedMounts:
          main:
            main:
              - path: /home/sftpuser/storage
