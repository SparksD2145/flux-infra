---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: irc-client
  namespace: tools
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 15m
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/thelounge/thelounge
              tag: "4.4.3"
            env:
              TZ: "America/Chicago"
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        storageClass: ceph-filesystem
        size: 10Gi
        retain: true
        globalMounts:
          - path: /var/opt/thelounge
    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 9000
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          hajimari.io/enable: "true"
          hajimari.io/icon: chat-outline
          hajimari.io/info: "IRC Client"
          hajimari.io/targetBlank: "true"
        hosts:
          - host: &host "irc.sparks.codes"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: acme-crt-secret-sparks-codes
            hosts:
              - *host
