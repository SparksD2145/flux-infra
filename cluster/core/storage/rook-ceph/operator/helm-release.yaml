---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-operator
  namespace: rook-ceph
spec:
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://charts.rook.io/release
      chart: rook-ceph
      version: v1.19.4
      sourceRef:
        kind: HelmRepository
        name: rook-charts
        namespace: flux-system
      interval: 15m
  values:
    crds:
      enabled: false
    csi:
      # -- The volume of the CephCSI RBD plugin DaemonSet
      csiRBDPluginVolume:
        - name: lib-modules
          hostPath:
            path: /run/booted-system/kernel-modules/lib/modules/
        - name: host-nix
          hostPath:
            path: /nix

      # -- The volume mounts of the CephCSI RBD plugin DaemonSet
      csiRBDPluginVolumeMount:
        - name: host-nix
          mountPath: /nix
          readOnly: true

      # -- The volume of the CephCSI CephFS plugin DaemonSet
      csiCephFSPluginVolume:
        - name: lib-modules
          hostPath:
            path: /run/booted-system/kernel-modules/lib/modules/
        - name: host-nix
          hostPath:
            path: /nix

      # -- The volume mounts of the CephCSI CephFS plugin DaemonSet
      csiCephFSPluginVolumeMount:
        - name: host-nix
          mountPath: /nix
          readOnly: true
